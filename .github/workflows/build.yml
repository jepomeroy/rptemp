name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Inspects conventional-commit messages (feat:/fix:/BREAKING CHANGE) since
  # the last tag and pushes the next semver tag. This is a plain git tag, not
  # a commit, so it never touches Cargo.toml in the repo.
  version:
    name: Tag version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.new_version }}
      tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

  build:
    name: Build ${{ matrix.package }} (${{ matrix.target }})
    needs: version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [rptemp_client, rptemp_monitor]
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install ARM64 cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure ARM64 cross linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.package }}
          key: ${{ matrix.target }}

      # Stamp the release version into this ephemeral checkout only (never
      # committed back) so CARGO_PKG_VERSION in the built binary matches the
      # release tag.
      - name: Set release version
        working-directory: ${{ matrix.package }}
        run: sed -i "s/^version = .*/version = \"${{ needs.version.outputs.version }}\"/" Cargo.toml

      - name: Build (rptemp_client)
        if: matrix.package == 'rptemp_client'
        working-directory: ${{ matrix.package }}
        run: cargo build --release --target ${{ matrix.target }}

      # rusb's "vendored" feature builds libusb from bundled C source via the
      # cross toolchain above, instead of requiring a target-arch libusb
      # system package. Used for both architectures so the two release
      # binaries are built the same way.
      - name: Build (rptemp_monitor)
        if: matrix.package == 'rptemp_monitor'
        working-directory: ${{ matrix.package }}
        run: cargo build --release --target ${{ matrix.target }} --features rusb/vendored

      - name: Package archive
        working-directory: ${{ matrix.package }}
        run: |
          staging="${{ matrix.package }}-${{ needs.version.outputs.tag }}-${{ matrix.target }}"
          mkdir "$staging"
          cp "target/${{ matrix.target }}/release/${{ matrix.package }}" "$staging/"
          cp README.md "$staging/"
          cp -r example "$staging/"
          tar czf "$staging.tar.gz" "$staging"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}-${{ matrix.target }}
          path: ${{ matrix.package }}/*.tar.gz
          retention-days: 1

  release:
    name: Create release
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          generate_release_notes: true
          files: dist/*.tar.gz
